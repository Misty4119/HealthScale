# ==========================================
#  HealthScale v2 Configuration
#  Folia-native health display scaling plugin
# ==========================================

# Enable or disable health scaling functionality
enabled: true

# Default global health scale value (20.0 = 10 hearts)
# Regardless of player's actual max health, UI will scale to this value
health-scale: 20.0

# Valid bounds for health-scale configuration
min-scale: 2.0
max-scale: 2048.0

# ==========================================
#  World-specific Overrides
#  Worlds listed here will use their own custom health-scale value.
#  Worlds not listed will default to the global health-scale above.
#
#  Supports two key formats (NamespacedKey preferred):
#  1. NamespacedKey format: "namespace:path" (e.g. "rpg:T1", "minecraft:overworld")
#  2. World name format: "worldName" (e.g. "world", "world_nether")
# ==========================================
world-overrides:
  # Example NamespacedKey override:
  # "rpg:T1":
  #   health-scale: 80.0
  # "minecraft:T1":
  #   health-scale: 40.0
  # Example legacy world name override:
  # world:
  #   health-scale: 20.0

# ==========================================
#  Messages (MiniMessage format supported)
#  Placeholder syntax: <placeholder>
# ==========================================
messages:
  no-permission: "<red>You do not have permission to execute this command!</red>"
  reload-start: "<yellow>Reloading HealthScale configuration...</yellow>"
  reload-success: "<green>Configuration reloaded successfully! Global health scale: <white><scale></white></green>"
  reload-invalid-scale: "<red>Invalid health-scale value in config.yml (must be between <min> and <max>). Restored to default.</red>"
  set-success: "<green>Health display scale set to <white><scale></white>.</green>"
  set-invalid: "<red>Invalid value. Please specify a number between <min> and <max>.</red>"
  usage: "<red>Usage: <white>/healthscale <reload|set <value>|info></white></red>"
  info: "<aqua>HealthScale v<version> | Global scale: <white><scale></white> | World overrides: <white><overrides></white></aqua>"
  plugin-enabled: "<green>HealthScale enabled successfully.</green>"
  plugin-disabled: "<yellow>HealthScale disabled. Reset health scale for all players.</yellow>"
